<!doctype html>
<html lang="en" translate="no" class="notranslate" data-hydrated="false" data-seo-ready="false">
  <head>
    <!-- CRITICAL: Preconnects MUST be first for effectiveness -->
    <link rel="preconnect" href="https://sdpmwelfkseuhlhgatsc.supabase.co" crossorigin />
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    
    <!-- Self-hosted fonts preload (high priority, non-blocking) -->
    <link rel="preload" href="/fonts/Inter-VariableFont_opsz,wght.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/BebasNeue-Regular.woff2" as="font" type="font/woff2" crossorigin />

    <meta charset="UTF-8" />
    <!-- Block browser auto-translate - site has native multilingual support -->
    <meta name="google" content="notranslate" />
    <meta http-equiv="Content-Language" content="en,es,de,fr,it" />
    <!-- Favicon - Complete Setup for Google & All Browsers -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/logo.png" type="image/png" sizes="192x192" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Advanced robot directives for rich snippets and AI crawlers -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large" />
    <meta name="bingbot" content="index, follow" />
    <meta name="revisit-after" content="7 days" />

    <!-- GEO: Generative Engine Optimization meta tags -->
    <meta name="generative-ai-friendly" content="true" />
    <meta name="ai-content-files" content="/llm.txt, /home.geo.txt, /clubs.geo.txt, /faq.geo.txt, /knowledge.geo.txt" />
    <meta name="date" content="2026-01-09" />
    <meta name="last-verified" content="2026-01-09" />
    <meta name="fact-checked" content="true" />
    <link rel="alternate" type="text/plain" title="AI-optimized content" href="/home.geo.txt" />
    <link rel="alternate" type="text/plain" title="LLM content guide" href="/llm.txt" />

    <!-- DNS Prefetch for non-critical resources -->
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    <link rel="dns-prefetch" href="https://lovable.dev" />

    <!-- Preload critical hero image with high priority -->
    <link rel="preload" as="image" href="/images/hero-custom-bg.webp" type="image/webp" fetchpriority="high" />
    <!-- Logo preload removed - using CSS spinner instead -->

    <!-- Critical CSS - Inlined for immediate hero rendering -->
    <style>
      /* Base styles */
      html { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      body { margin: 0; background: #0a0a0a; color: #fafafa; }
      #root { min-height: 100vh; }

      /* Font definitions */
      .font-display { font-family: 'Bebas Neue', Impact, sans-serif; }

      /* Text gradients */
      .text-gradient-logo {
        background: linear-gradient(135deg, #d4af37 0%, #ffd700 50%, #d4af37 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .text-gradient-primary {
        background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Header critical styles */
      .sticky { position: sticky; }
      .top-0 { top: 0; }
      .z-50 { z-index: 50; }
      .backdrop-blur { backdrop-filter: blur(12px); }
      .bg-background\/95 { background: rgba(10, 10, 10, 0.95); }
      .border-b { border-bottom-width: 1px; }
      .border-border\/40 { border-color: rgba(255, 255, 255, 0.1); }

      /* Button critical styles */
      .bg-primary { background: #d4af37; }
      .text-primary-foreground { color: #0a0a0a; }
      .text-primary { color: #d4af37; }

      /* Card skeleton critical styles */
      .skeleton {
        background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s ease-in-out infinite;
      }
      @keyframes skeleton-loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* Loading spinner */
      @keyframes spin { to { transform: rotate(360deg); } }
      .animate-spin { animation: spin 1s linear infinite; }

      /* Glass effect for trust badges */
      .glass-effect {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
      }
    </style>


    <!-- Prefetch next likely navigation -->
    <link rel="prefetch" href="/clubs" as="document" />
    <link rel="prefetch" href="/guides" as="document" />

    <!-- MINIMAL FALLBACK SEO - Will be replaced by SEOHead component per route -->
    <!-- These values are ONLY for the SPA shell before React hydrates -->
    <title>Weed Madrid</title>
    <meta name="description" content="Cannabis clubs in Madrid - educational guide" />
    <meta property="og:image" content="https://www.weedmadrid.com/logo.png" />
    <meta name="twitter:image" content="https://www.weedmadrid.com/logo.png" />
  </head>

  <body>
    <!-- Minimal noscript fallback for JS-disabled crawlers -->
    <noscript>
      <div style="padding: 2rem; text-align: center; background: #0a0a0a; color: #fafafa; min-height: 100vh;">
        <div role="heading" aria-level="1" style="color: #d4af37; font-size: 2rem; margin-bottom: 1rem;">
          Weed Madrid
        </div>
        <p>Your guide to cannabis clubs in Madrid. Please enable JavaScript for the full experience.</p>
        <nav style="margin-top: 2rem;">
          <a href="/clubs" style="color: #d4af37; margin: 0 1rem;">Cannabis Clubs</a>
          <a href="/guides" style="color: #d4af37; margin: 0 1rem;">Guides</a>
          <a href="/faq" style="color: #d4af37; margin: 0 1rem;">FAQ</a>
        </nav>
      </div>
    </noscript>

    <!-- React root - content will be rendered here -->
    <div id="root">
      <!-- Minimal loading state with CSS spinner - no external image request -->
      <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0a0a;">
        <div style="text-align: center;">
          <div
            style="width: 48px; height: 48px; border: 3px solid #333; border-top-color: #d4af37; border-radius: 50%; margin: 0 auto 1rem; animation: spin 1s linear infinite;"
          ></div>
          <p style="color: #888; margin: 0;">Loading...</p>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
