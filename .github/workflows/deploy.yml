# SEO-optimized build pipeline with prerendering
name: Build, Prerender & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Vite
        run: bun run build

      - name: Setup Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Prerender all routes
        run: node scripts/prerender.mjs

      - name: Validate SEO
        run: node scripts/validate-seo.mjs

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'

      - name: Notify IndexNow (Bing/Yandex)
        run: |
          echo "🔔 Submitting URLs to IndexNow..."
          curl -s -X POST "https://sdpmwelfkseuhlhgatsc.supabase.co/functions/v1/index-now" \
            -H "Content-Type: application/json" \
            --max-time 120 || echo "IndexNow notification failed (non-blocking)"
          echo "✅ IndexNow notification sent"
